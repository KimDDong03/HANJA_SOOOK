<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manual Stroke Duplicate Compare</title>
  <style>
    :root { --bg:#f6f1e7; --ink:#1f2933; --muted:#687386; --card:#fffaf0; --line:#d7c9ad; --mine:#0f766e; --other:#b45309; --danger:#b91c1c; }
    * { box-sizing:border-box; }
    body { margin:0; background:radial-gradient(circle at top left,#fff7dc,#f6f1e7 36%,#eadfcb); color:var(--ink); font-family:Georgia,'Times New Roman',serif; }
    header { padding:18px 20px 10px; border-bottom:1px solid var(--line); background:rgba(255,250,240,.86); position:sticky; top:0; z-index:2; backdrop-filter:blur(10px); }
    h1 { margin:0 0 10px; font-size:24px; letter-spacing:-.02em; }
    .toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    select, button { border:1px solid var(--line); background:#fffef8; color:var(--ink); border-radius:10px; padding:10px 12px; font-size:15px; }
    button.primary { background:var(--ink); color:white; border-color:var(--ink); }
    button.mine { background:var(--mine); color:white; border-color:var(--mine); }
    button.other { background:var(--other); color:white; border-color:var(--other); }
    main { padding:18px 20px 28px; max-width:1280px; margin:0 auto; }
    .summary { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin-bottom:14px; }
    .pill { background:rgba(255,250,240,.9); border:1px solid var(--line); border-radius:14px; padding:10px 12px; }
    .pill strong { display:block; font-size:20px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .card { background:rgba(255,250,240,.92); border:1px solid var(--line); border-radius:18px; padding:14px; box-shadow:0 20px 50px rgba(93,64,24,.12); }
    .card h2 { margin:0 0 8px; font-size:20px; display:flex; justify-content:space-between; gap:10px; }
    .meta { color:var(--muted); font-size:14px; line-height:1.45; margin-bottom:10px; }
    .badge { border-radius:999px; padding:4px 8px; font-size:12px; color:white; white-space:nowrap; }
    .badge.mine { background:var(--mine); } .badge.other { background:var(--other); } .badge.bad { background:var(--danger); }
    svg { width:100%; aspect-ratio:1/1; background:#fffdf7; border:1px solid var(--line); border-radius:14px; touch-action:none; }
    .guide { stroke:#e8dcc5; stroke-width:.45; fill:none; }
    .ghost { font-family:serif; font-size:74px; text-anchor:middle; dominant-baseline:central; fill:#efe6d4; font-weight:700; }
    .stroke { fill:none; stroke-width:4.8; stroke-linecap:round; stroke-linejoin:round; opacity:.95; }
    .stroke.draw { transition: stroke-dashoffset .62s cubic-bezier(.2,.8,.2,1); }
    .mineStroke { stroke:var(--mine); } .otherStroke { stroke:var(--other); }
    .num { font:700 5px Georgia,serif; paint-order:stroke fill; stroke:#fffdf7; stroke-width:.8; text-anchor:middle; dominant-baseline:central; }
    .mineNum { fill:var(--mine); } .otherNum { fill:var(--other); }
    .list { margin-top:14px; display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:8px; }
    .item { text-align:left; border:1px solid var(--line); border-radius:12px; background:#fffef8; padding:9px 10px; cursor:pointer; }
    .item.active { outline:3px solid rgba(15,118,110,.22); border-color:var(--mine); }
    .item b { font-size:20px; margin-right:6px; }
    .item span { color:var(--muted); font-size:12px; display:block; margin-top:3px; }
    @media (max-width: 850px) { .grid, .summary { grid-template-columns:1fr; } header { position:static; } }
  </style>
</head>

<script>
const pairs = JSON.parse(document.getElementById('pairsData').textContent);
const decisions = new Map();
let activeIndex = 0;
let timers = [];
const els = {
  pairSelect: document.getElementById('pairSelect'), pairList: document.getElementById('pairList'),
  mineSvg: document.getElementById('mineSvg'), otherSvg: document.getElementById('otherSvg'),
  mineMeta: document.getElementById('mineMeta'), otherMeta: document.getElementById('otherMeta'),
  mineBadge: document.getElementById('mineBadge'), otherBadge: document.getElementById('otherBadge'),
  totalPairs: document.getElementById('totalPairs'), sameIdPairs: document.getElementById('sameIdPairs'), sameCharPairs: document.getElementById('sameCharPairs'), decision: document.getElementById('decision')
};
function normId(row){ return row.hanjaId || String(row.id || '').replace(/^stroke-/, ''); }
function clearTimers(){ timers.forEach(clearTimeout); timers = []; }
function firstPoint(path){ const m = String(path).match(/[Mm]\s*([-+0-9.eE]+)[,\s]+([-+0-9.eE]+)/); return m ? {x:Number(m[1]), y:Number(m[2])} : {x:50,y:50}; }
function svgBase(svg, ch){ svg.innerHTML = '<rect x="4" y="4" width="92" height="92" rx="2" fill="none" stroke="#eadfc9"/><path class="guide" d="M50 6 V94 M6 50 H94 M17 17 L83 83 M83 17 L17 83"/><text class="ghost" x="50" y="52">' + escapeHtml(ch) + '</text>'; }
function draw(svg, row, side, animate){
  svgBase(svg, row.character);
  const paths = row.svgPaths || [];
  paths.forEach((d, i) => {
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d', d);
    p.setAttribute('class', 'stroke ' + side + 'Stroke' + (animate ? ' draw' : ''));
    svg.appendChild(p);
    const length = Math.max(1, p.getTotalLength());
    if (animate) {
      p.style.strokeDasharray = String(length);
      p.style.strokeDashoffset = String(length);
    }
    const pt = firstPoint(d);
    const n = document.createElementNS('http://www.w3.org/2000/svg','text');
    n.textContent = String(i + 1);
    n.setAttribute('x', pt.x);
    n.setAttribute('y', pt.y);
    n.setAttribute('class', 'num ' + side + 'Num');
    n.style.visibility = animate ? 'hidden' : 'visible';
    svg.appendChild(n);
    if (animate) {
      timers.push(setTimeout(() => {
        p.style.strokeDashoffset = '0';
        timers.push(setTimeout(() => { n.style.visibility = 'visible'; }, 500));
      }, i * 680));
    }
  });
}
function rowMeta(row){ return normId(row) + ' · ' + escapeHtml(row.character) + ' · ' + row.strokeCount + '획 · ' + (row.reviewStatus || '') + '<br>' + ((row.svgPaths || []).length) + '개 path'; }
function render(animate=false){
  clearTimers();
  const pair = pairs[activeIndex];
  els.mineMeta.innerHTML = rowMeta(pair.mine); els.otherMeta.innerHTML = rowMeta(pair.other);
  els.mineBadge.textContent = pair.mine.strokeCount + '획'; els.otherBadge.textContent = pair.other.strokeCount + '획';
  els.mineBadge.className = 'badge mine' + (pair.mine.strokeCount !== pair.other.strokeCount ? ' bad' : '');
  els.otherBadge.className = 'badge other' + (pair.mine.strokeCount !== pair.other.strokeCount ? ' bad' : '');
  draw(els.mineSvg, pair.mine, 'mine', animate); draw(els.otherSvg, pair.other, 'other', animate);
  els.decision.textContent = decisions.get(pair.key) || '미선택';
  els.pairSelect.value = String(activeIndex);
  [...els.pairList.children].forEach((el, i) => el.classList.toggle('active', i === activeIndex));
}
function escapeHtml(v){ return String(v).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])); }
function init(){
  els.totalPairs.textContent = pairs.length;
  els.sameIdPairs.textContent = pairs.filter(p => p.kind === 'same_id').length;
  els.sameCharPairs.textContent = pairs.filter(p => p.kind === 'same_char').length;
  pairs.forEach((p, i) => {
    const label = (p.kind === 'same_id' ? 'ID' : '글자') + ' · ' + p.title + ' · 내 ' + p.mine.strokeCount + ' / 상대 ' + p.other.strokeCount;
    const opt = document.createElement('option'); opt.value = String(i); opt.textContent = label; els.pairSelect.appendChild(opt);
    const btn = document.createElement('button'); btn.className = 'item'; btn.innerHTML = '<b>' + escapeHtml(p.character) + '</b>' + escapeHtml(p.title) + '<span>내 ' + normId(p.mine) + ' ' + p.mine.strokeCount + '획 / 상대 ' + normId(p.other) + ' ' + p.other.strokeCount + '획</span>';
    btn.addEventListener('click', () => { activeIndex = i; render(false); }); els.pairList.appendChild(btn);
  });
  els.pairSelect.addEventListener('change', () => { activeIndex = Number(els.pairSelect.value); render(false); });
  document.getElementById('playBoth').addEventListener('click', () => render(true));
  document.getElementById('pause').addEventListener('click', clearTimers);
  document.getElementById('reset').addEventListener('click', () => render(false));
  document.getElementById('chooseMine').addEventListener('click', () => { decisions.set(pairs[activeIndex].key, '내 것'); render(false); });
  document.getElementById('chooseOther').addEventListener('click', () => { decisions.set(pairs[activeIndex].key, '상대 것'); render(false); });
  render(false);
}
init();
</script>
