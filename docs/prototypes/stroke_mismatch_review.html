<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stroke Mismatch Review</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --surface: #ffffff;
      --ink: #101828;
      --muted: #667085;
      --line: #d7deea;
      --accent: #c7432b;
      --paper: #fffdf8;
      --warn: #b54708;
      --ok: #087443;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
    }
    main {
      width: min(1420px, calc(100% - 28px));
      margin: 22px auto;
    }
    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }
    .summary {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    button {
      height: 38px;
      border: 1px solid var(--ink);
      border-radius: 6px;
      background: var(--ink);
      color: white;
      padding: 0 14px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    button.secondary {
      background: white;
      color: var(--ink);
      border-color: var(--line);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--surface);
      border: 1px solid #e4e7ec;
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 8px 20px rgba(16, 24, 40, 0.05);
    }
    .meta {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }
    .char {
      font-family: "Noto Serif KR", Batang, serif;
      font-size: 34px;
      line-height: 1;
    }
    .title {
      min-width: 0;
    }
    .title strong {
      display: block;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .title span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #d0d5dd;
      border-radius: 999px;
      padding: 2px 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }
    .badge.warn {
      color: var(--warn);
      border-color: #fedf89;
      background: #fffaeb;
    }
    .badge.more {
      color: #175cd3;
      border-color: #b2ccff;
      background: #eff4ff;
    }
    dl {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 8px;
      margin: 8px 0;
      font-size: 12px;
    }
    dt { color: var(--muted); }
    dd {
      margin: 0;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    svg {
      display: block;
      width: 100%;
      aspect-ratio: 1;
    }
    .paper {
      fill: var(--paper);
      stroke: #d8c7a2;
      stroke-width: 0.75;
    }
    .guide {
      fill: none;
      stroke: #d8c7a2;
      stroke-width: 0.35;
      stroke-dasharray: 1.4 1.6;
    }
    .ghost {
      fill: rgba(16, 24, 40, 0.075);
      font-family: "Noto Serif KR", Batang, serif;
      font-size: 78px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: central;
    }
    .stroke {
      fill: none;
      stroke: var(--accent);
      stroke-width: 4.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      animation-name: draw;
      animation-duration: 0.28s;
      animation-timing-function: ease-out;
      animation-fill-mode: forwards;
      animation-play-state: paused;
    }
    .playing .stroke { animation-play-state: running; }
    .num {
      fill: white;
      stroke: var(--accent);
      stroke-width: 0.65;
      paint-order: stroke fill;
      font-size: 5px;
      font-weight: 900;
      dominant-baseline: central;
      text-anchor: middle;
      opacity: 0;
      animation: show 0.16s ease-out forwards paused;
    }
    .playing .num { animation-play-state: running; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes show { to { opacity: 1; } }
    @media (max-width: 760px) {
      header { align-items: start; flex-direction: column; }
      .toolbar { justify-content: start; }
    }
  </style>
</head>

      </div>
    </header>
    <section id="grid" class="grid"></section>

    const grid = document.getElementById("grid");
    const replay = document.getElementById("replay");
    let activeFilter = "all";

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;",
      }[ch]));
    }

    function startPoint(path) {
      const match = String(path).match(/M\s*([0-9.+-]+)[,\s]+([0-9.+-]+)/i);
      return match ? { x: match[1], y: match[2] } : { x: 50, y: 50 };
    }

    function visibleRows() {
      if (activeFilter === "fewer") return rows.filter((row) => row.delta < 0);
      if (activeFilter === "more") return rows.filter((row) => row.delta > 0);
      return rows;
    }

    function render() {
      const data = visibleRows();
      grid.innerHTML = data.map((row) => {
        const paths = row.svgPaths || [];
        const deltaLabel = row.delta > 0 ? `+${row.delta}` : row.delta;
        const deltaClass = row.delta > 0 ? "more" : "warn";
        const strokes = paths.map((path, index) => {
          const delay = 0.1 + index * 0.3;
          const point = startPoint(path);
          return `
            <path class="stroke" d="${esc(path)}" pathLength="1" style="animation-delay:${delay}s"></path>
            <text class="num" x="${point.x}" y="${point.y}" style="animation-delay:${delay + 0.08}s">${index + 1}</text>
          `;
        }).join("");
        return `
          <article class="card">
            <div class="meta">
              <div class="char">${esc(row.character)}</div>
              <div class="title">
                <strong>${esc(row.hanjaId)} · ${esc(row.sound)} · ${esc(row.meaning)}</strong>
                <span>${esc(row.unitId)} · ${esc(row.unitName)}</span>
              </div>
            </div>
            <div class="badges">
              <span class="badge">${esc(row.source)}</span>
              <span class="badge ${deltaClass}">현재 ${row.actualStrokeCount} / 기준 ${row.expectedStrokeCount} (${deltaLabel})</span>
            </div>
            <dl>
              <dt>원본자</dt><dd>${esc(row.sourceCharacter)}</dd>
              <dt>난이도</dt><dd>${esc(row.grade)} · ${esc(row.difficulty)}</dd>
            </dl>
            <svg viewBox="0 0 100 100" aria-label="${esc(row.character)} preview">
              <rect class="paper" x="4" y="4" width="92" height="92" rx="2"></rect>
              <path class="guide" d="M50 6 V94 M6 50 H94 M17 17 L83 83 M83 17 L17 83"></path>
              <text class="ghost" x="50" y="52">${esc(row.character)}</text>
              ${strokes}
            </svg>
          </article>
        `;
      }).join("");
      document.body.classList.remove("playing");
      requestAnimationFrame(() => document.body.classList.add("playing"));
    }

    document.querySelectorAll("[data-filter]").forEach((button) => {
      button.addEventListener("click", () => {
        activeFilter = button.dataset.filter;
        render();
      });
    });
    replay.addEventListener("click", render);
    render();
  </script>
