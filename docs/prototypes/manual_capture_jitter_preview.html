<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manual Capture Jitter Preview</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --surface: #ffffff;
      --ink: #101828;
      --muted: #667085;
      --raw: #98a2b3;
      --clean: #c7432b;
      --paper: #fffdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
    }
    main {
      width: min(1240px, calc(100% - 28px));
      margin: 22px auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }
    .summary {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }
    button {
      height: 38px;
      border: 1px solid var(--ink);
      border-radius: 6px;
      background: var(--ink);
      color: white;
      padding: 0 14px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--surface);
      border: 1px solid #e4e7ec;
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 8px 20px rgba(16, 24, 40, 0.05);
    }
    .meta {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .meta strong {
      font-family: "Noto Serif KR", Batang, serif;
      font-size: 30px;
      line-height: 1;
    }
    .meta span {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
      white-space: nowrap;
    }
    .pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .label {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    svg {
      display: block;
      width: 100%;
      aspect-ratio: 1;
    }
    .paper {
      fill: var(--paper);
      stroke: #d8c7a2;
      stroke-width: 0.75;
    }
    .guide {
      fill: none;
      stroke: #d8c7a2;
      stroke-width: 0.35;
      stroke-dasharray: 1.4 1.6;
    }
    .ghost {
      fill: rgba(16, 24, 40, 0.075);
      font-family: "Noto Serif KR", Batang, serif;
      font-size: 78px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: central;
    }
    .stroke {
      fill: none;
      stroke-width: 4.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      animation-name: draw;
      animation-duration: 0.34s;
      animation-timing-function: ease-out;
      animation-fill-mode: forwards;
      animation-play-state: paused;
    }
    .raw .stroke { stroke: var(--raw); }
    .clean .stroke { stroke: var(--clean); }
    .playing .stroke { animation-play-state: running; }
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }
  </style>
</head>

    const grid = document.getElementById("grid");
    const replay = document.getElementById("replay");

    function renderSvg(row, mode) {
      const strokes = (row.svgPaths || []).map((path, index) => {
        const delay = 0.12 + index * 0.38;
        return `<path class="stroke" d="${path}" pathLength="1" style="animation-delay:${delay}s"></path>`;
      }).join("");
      return `
        <svg class="${mode}" viewBox="0 0 100 100">
          <rect class="paper" x="4" y="4" width="92" height="92" rx="2"></rect>
          <path class="guide" d="M50 6 V94 M6 50 H94 M17 17 L83 83 M83 17 L17 83"></path>
          <text class="ghost" x="50" y="52">${row.character}</text>
          ${strokes}
        </svg>
      `;
    }

    function render() {
      grid.innerHTML = originals.map((row, index) => `
        <article class="card">
          <div class="meta">
            <strong>${row.character}</strong>
            <span>${row.hanjaId} · ${row.svgPaths.length}획</span>
          </div>
          <div class="pair">
            <div>
              <p class="label">원본</p>
              ${renderSvg(row, "raw")}
            </div>
            <div>
              <p class="label">흔들림만 보정</p>
              ${renderSvg(jittered[index], "clean")}
            </div>
          </div>
        </article>
      `).join("");
      requestAnimationFrame(() => document.body.classList.add("playing"));
    }

    replay.addEventListener("click", () => {
      document.body.classList.remove("playing");
      render();
    });
    render();
  </script>
