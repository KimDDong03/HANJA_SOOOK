<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Font Outline Stroke Preview</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #111827;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #d14f2a;
      --paper: #fffdf8;
      --bg: #f4f7fb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    main {
      width: min(1180px, calc(100% - 32px));
      margin: 28px auto;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.55;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 16px;
    }
    .card {
      background: white;
      border: 1px solid #e4e7ec;
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 8px 20px rgba(16, 24, 40, 0.06);
    }
    .meta {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .meta strong {
      font-family: "Noto Serif KR", Batang, serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }
    .meta span {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
      white-space: nowrap;
    }
    svg {
      display: block;
      width: 100%;
      aspect-ratio: 1;
    }
    .paper {
      fill: var(--paper);
      stroke: #d8c7a2;
      stroke-width: 0.7;
    }
    .guide {
      fill: none;
      stroke: #d8c7a2;
      stroke-width: 0.35;
      stroke-dasharray: 1.4 1.4;
    }
    .outline {
      fill: rgba(17, 24, 39, 0.13);
      stroke: rgba(17, 24, 39, 0.38);
      stroke-width: 0.45;
    }
    .stroke {
      fill: none;
      stroke: var(--accent);
      stroke-width: 4.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: draw 0.38s ease-out forwards;
    }
    .num {
      fill: white;
      stroke: var(--accent);
      stroke-width: 0.6;
      paint-order: stroke fill;
      font-size: 5px;
      font-weight: 800;
      dominant-baseline: central;
      text-anchor: middle;
      opacity: 0;
      animation: show 0.18s ease-out forwards;
    }
    .s1 { animation-delay: 0.12s; }
    .s2 { animation-delay: 0.52s; }
    .s3 { animation-delay: 0.92s; }
    .s4 { animation-delay: 1.32s; }
    .s5 { animation-delay: 1.72s; }
    .s6 { animation-delay: 2.12s; }
    .s7 { animation-delay: 2.52s; }
    .s8 { animation-delay: 2.92s; }
    .num:nth-of-type(1) { animation-delay: 0.18s; }
    .num:nth-of-type(2) { animation-delay: 0.58s; }
    .num:nth-of-type(3) { animation-delay: 0.98s; }
    .num:nth-of-type(4) { animation-delay: 1.38s; }
    .num:nth-of-type(5) { animation-delay: 1.78s; }
    .num:nth-of-type(6) { animation-delay: 2.18s; }
    .num:nth-of-type(7) { animation-delay: 2.58s; }
    .num:nth-of-type(8) { animation-delay: 2.98s; }
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }
    @keyframes show {
      to { opacity: 1; }
    }
  </style>
</head>
